name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# All secrets/keys below are throwaway values that only exist for the lifetime of a CI run —
# nothing here is deployed anywhere, so there is nothing to store in GitHub Secrets for this
# workflow. Real credentials (Google OAuth, hCaptcha, SMTP) stay unset; the app already treats
# them as optional in dev/test (see backend/.env.example) and the tests/build don't need them.

jobs:
  backend:
    name: Backend — lint, test, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DB_URI: mongodb://127.0.0.1:27017/kitgrid?replicaSet=rs0
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      CSRF_SECRET: ci-test-csrf-secret
      MFA_ENCRYPTION_KEY: ci-test-mfa-encryption-key
      FRONTEND_ORIGIN: http://localhost:5173
      BACKEND_ORIGIN: http://localhost:5000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run lint

      # Not using the `services:` key here because it can't pass `--replSet rs0` to the
      # container — booking creation uses a multi-document transaction (Phase 18), which
      # requires Mongo running as a replica set, even a single-node one (see docker-compose.yml).
      - name: Start MongoDB (single-node replica set)
        run: |
          docker run -d --name mongo -p 27017:27017 mongo:7 --replSet rs0 --bind_ip_all
          echo "Waiting for mongod..."
          for i in $(seq 1 30); do
            docker exec mongo mongosh --quiet --eval "db.adminCommand('ping')" >/dev/null 2>&1 && break
            sleep 1
          done
          docker exec mongo mongosh --quiet --eval "try { rs.status() } catch (e) { rs.initiate() }"
          echo "Waiting for replica set to elect a primary..."
          for i in $(seq 1 30); do
            state=$(docker exec mongo mongosh --quiet --eval "rs.status().myState" 2>/dev/null || echo "")
            [ "$state" = "1" ] && break
            sleep 1
          done

      - name: Start Redis
        run: docker run -d --name redis -p 6379:6379 redis:7-alpine

      - run: npm test

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  frontend:
    name: Frontend — lint, build, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  docker-build:
    name: Docker images build cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t kitgrid-backend:ci ./backend
      - run: docker build -t kitgrid-frontend:ci ./frontend

  # Deliberately separate from the manual Burp Pro pentest in Phases 32-36. Burp Pro is built
  # for interactive, hands-driven testing and has no official headless/CI action, so it can't
  # live in this pipeline. ZAP's baseline scan (spider + passive analysis, no active attacks)
  # does have an official GitHub Action, so it runs here as continuous regression coverage on
  # every push to main — a lightweight, automated complement to the deliberate, deeper manual
  # pentest, not a replacement for it.
  zap-baseline:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Throwaway env files for a CI-only, ephemeral instance — same reasoning as the backend
      # job above, nothing here is a real secret and nothing here is deployed.
      - name: Write CI-only .env files
        run: |
          cat > backend/.env <<'EOF'
          PORT=5000
          NODE_ENV=production
          DB_URI=mongodb://mongo:27017/kitgrid?replicaSet=rs0
          REDIS_URL=redis://redis:6379
          JWT_SECRET=ci-zap-jwt-secret
          JWT_REFRESH_SECRET=ci-zap-refresh-secret
          CSRF_SECRET=ci-zap-csrf-secret
          MFA_ENCRYPTION_KEY=ci-zap-mfa-encryption-key
          FRONTEND_ORIGIN=http://localhost:5173
          BACKEND_ORIGIN=http://localhost:5000
          EOF
          cat > frontend/.env <<'EOF'
          VITE_API_BASE_URL=http://localhost:5000/api
          EOF

      - name: Start the app (docker compose)
        run: docker compose up -d --build

      - name: Wait for the backend to accept requests
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:5000/health -o /dev/null && break
            sleep 2
          done

      - name: Wait for the frontend dev server
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:5173/ -o /dev/null && break
            sleep 2
          done

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5173'
          # Baseline = spider + passive scan only, no active attack traffic — safe to run
          # against a live instance on every push. Report is uploaded as a build artifact
          # rather than failing the build outright, since a first pass will surface findings
          # (e.g. informational headers) that need triage rather than an instant red pipeline.
          fail_action: false
          cmd_options: '-a'

      - name: Tear down
        if: always()
        run: docker compose down -v
