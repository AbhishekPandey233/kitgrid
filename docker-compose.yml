services:
  mongo:
    image: mongo:7
    container_name: kitgrid-mongo
    restart: unless-stopped
    # Single-node replica set — required for multi-document transactions (Phase 18's
    # booking overlap/quantity check), which a plain standalone mongod doesn't support.
    command: ["--replSet", "rs0", "--bind_ip_all"]
    # Host-side port is 27018, not 27017 — there's a native Windows mongod already bound to
    # 127.0.0.1:27017 on this machine, and "localhost:27017" from a host tool (e.g. Compass)
    # resolves there instead of into this container, silently landing on the wrong,
    # unrelated database. The backend is unaffected either way — it talks to Mongo via the
    # Docker network's internal DNS at mongo:27017, never through this host-side mapping.
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - kitgrid-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: a --replSet mongod doesn't have a primary (and rejects app connections that
  # request replicaSet=rs0) until rs.initiate() has been called on it once. Without this,
  # a fresh `docker compose up` on a clean volume never gets past "server selection timed
  # out" in the backend. Idempotent — does nothing if the set is already initiated, so it's
  # safe to run again on every `docker compose up`.
  #
  # The member host is set explicitly to "mongo:27017" (the Docker DNS name other containers
  # use to reach it) rather than left to rs.initiate()'s auto-detection, which records the
  # container's own short hostname/ID instead — unresolvable to any other container, and a
  # config only the mongo container itself can (sometimes) work around by reusing an
  # already-open connection. Other containers doing a fresh connection see
  # "Our replica set config is invalid or we are not a member of it".
  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kitgrid-net
    restart: "no"
    entrypoint:
      - mongosh
      - --host
      - mongo
      - --quiet
      - --eval
      - "try { rs.status() } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }) }"

  redis:
    image: redis:7-alpine
    container_name: kitgrid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - kitgrid-net

  backend:
    build: ./backend
    container_name: kitgrid-backend
    restart: unless-stopped
    env_file: ./backend/.env
    # TLS_CERT_PATH/TLS_KEY_PATH point at a mkcert-issued dev cert (see certs/, gitignored —
    # generate your own with `mkcert -cert-file certs/dev-cert.pem -key-file certs/dev-key.pem
    # localhost kitgrid 127.0.0.1 ::1 <your VMware host IPs>`). server.js falls back to plain
    # HTTP if these are unset, so this is optional but on by default here.
    environment:
      - TLS_CERT_PATH=/certs/dev-cert.pem
      - TLS_KEY_PATH=/certs/dev-key.pem
    ports:
      - "5000:5000"
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./certs:/certs:ro
    networks:
      - kitgrid-net

  frontend:
    build: ./frontend
    container_name: kitgrid-frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    environment:
      - TLS_CERT_PATH=/certs/dev-cert.pem
      - TLS_KEY_PATH=/certs/dev-key.pem
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./certs:/certs:ro
    networks:
      - kitgrid-net

volumes:
  mongo_data:

networks:
  kitgrid-net:
    driver: bridge
